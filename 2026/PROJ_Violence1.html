# Violence des hommes ! <br/>Violence de Dieu ?

--

### Mercredi de théologie 1/5

--

## 5 séances pour se confronter à la violence dans la Bible

---

La violence traverse notre monde.

--

Nous sommes traversés par la violence : celle qui nous subissons, celle qui nous habite...

--

Il n'est pas étonnant de rencontrer, dans la Bible, de la violence.

--

Qu'est-ce que cela peut nous révéler

--

- de l'être humain ?

--

- de Dieu ?

--

- des relations entre humains et Dieu ?

--

Nous n'aurons pas trop de 5 soirées pour explorer la question. 

---

1. Caïn et Abel : Gn 4

--

2. Une leçon de non violence pour David :  1Sa 24-26

--

3. Dieu commande-t-il d'exterminer ses ennemis ? Jos 6-7

--

4. Dieu commande-t-il des abominations ? Jr19-Ez20 et Gn22

--

5. Jésus face à la violence

---

# Caïn et Abel

--

En ouvrant la Bible au premier livre, on trouve d'abord les récits de création, puis la première transgression et ses conséquences. 

--

Vient ensuite, très vite, le premier meurtre : c'est un fratricide ! 

--

Il y a 2 ans, lors des mercredi de théologie, nous avons eu l'occasion de souligner que 

--

- les récits de création, dans la Bible, se déroulent dans une atmosphère sereine, 

--

- qui contraste très fortement avec les mythes du Proche-Orient Ancien dans lesquels 

--

  - le ciel et la terre sont la dépouille d'un dieu vaincu 

--

  - mis à mort par d'autres dieux après un conflit primordial entre divinités. 

--

En ce sens, on peut dire que le ciel et la terre sont créés par Dieu dans la non-violence ! 

---

Il va falloir raconter, ensuite, l'irruption de la violence dans le monde, 

--

- mais il est significatif que cette violence n'est pas originelle. 

--

- elle est un "accident" de la création,

--

- le récit de Gn 4 souligne l'importance de la liberté humaine. 

--

Lisons le récit où Caïn tue son frère Abel : 

--

- on ne cherchera pas à lire ce passage comme un reportage sur la manière dont les faits se sont exactement déroulés, 

--

  - puisque la Bible n'est pas un procès-verbal de gendarmerie...

--

- on cherchera ce que le livre de la Genèse cherche à dire 

--

  - de la violence, 

--

  - du danger qu'elle représente, 

--

  - et de la manière dont Dieu est concerné par tout cela. 

---

**Gn 4**

--

> 1L'homme connut Eve sa femme. 
> 
> Elle devint enceinte, enfanta Caïn et dit : « J'ai procréé un homme, avec le SEIGNEUR. » 

--

* le verbe connaître désigne ici des relations sexuelles

--

* la parole d'Eve joue sur la racine du nom Caïn

--

  * j'ai procréé,  du verbe קָנָה QNH

--

  * Caïn = קַיִן  QYN

--

* Caïn est le premier humain qui n'est pas créé directement par Dieu

--

  * c'est ce que met en valeur la traduction "procréé"

--

  * "avec le Seigneur" : car c'est lui qui donne la vie

---

> 2Elle enfanta encore son frère Abel.

--

- Abel = הֶבֶל

--

  - nom qui signifie : vapeur, respiration, 

--

  - et au sens figuré : futilité 

--

- avant d'être nommé, Abel est caractérisé comme "son frère"

--

  - ce sera le cas à plusieurs reprises dans la suite du texte. 

--

> Abel faisait paître les moutons, Caïn cultivait le sol. 

--

* chaque frère a son domaine.

--

  * celui d'Abel est promis à une longue postérité : les nomades sont des éleveurs.

--

  * celui de Caïn nous rappelle le chapitre précédent de Gn

--

  * **Gn 3,17** "Il  dit à Adam : « Parce que tu as écouté la voix de ta femme et que tu as mangé de l'arbre dont je t'avais formellement prescrit de ne pas manger,
     le **sol** sera maudit à cause de toi. C'est dans la peine que tu t'en 
    nourriras tous les jours de ta vie" 

---

> 3A la fin de la saison, Caïn apporta au SEIGNEUR une offrande de fruits du sol 

--

- c'est l'aîné qui a l'initiative de l'offrande (מִנְחָה)

--

  - le sol a tout de même produit du fruit

--

  - la Torah prescrira des offrandes végétales

--

> 4Abel apporta lui aussi des premiers-nés de ses bêtes et leur graisse. 

--

- Abel fait de même "lui aussi"

--

  - avec une offrande animale, qui correspond à son activité

--

  - des premiers-nés du troupeau : l'offrande des premiers-nés fera l'objet de commandements spécifiques dans la Torah

--

  - et dans les sacrifices, même lorsqu'une partie de la viande est mangée, les parties grasses des offrandes animales sont réservées au Seigneur : on les fait fumer à l'autel. 

--

- Il ne s'agit pas dans ce passage d'appliquer les règles de la Loi qui ne sont pas encore écrites...

--

  - mais chaque frère, à sa manière, préfigure les offrandes qui seront prescrites par la Torah.

---

> Le SEIGNEUR tourna son regard vers Abel et son offrande, 
> 
> 5mais il détourna son regard de Caïn et de son offrande. Caïn en fut très irrité et son visage fut abattu.

--

- le frère cadet, qui se nomme "buée", a fait mieux que le frère aîné...

--

- le texte ne dit pas "comment" Caïn et Abel savent de quelle manière le Seigneur regarde leur offrande.

--

  - Rachi précise qu'un feu est descendu du ciel et a consumé l'offrande d'Abel

--

  - mais le texte biblique n'apporte pas cette précision : il donne juste le résultat.

--

- deux verbes décrivent la réaction de Caïn

--

  - en fut très irrité = "cela s'échauffa beaucoup pour lui" 

--

  - son visage fut abattu = "ses faces tombèrent" 

--

> 6Le SEIGNEUR dit à Caïn : « Pourquoi t'irrites-tu ? Et pourquoi ton visage est-il abattu ? 7Si tu agis bien, ne le relèveras-tu pas ? Si tu n'agis pas bien, le péché, tapi à ta porte, te désire. Mais toi, domine-le. »

---
> 6Le SEIGNEUR dit à Caïn : « Pourquoi t'irrites-tu ? Et pourquoi ton visage est-il abattu ? 7Si tu agis bien, ne le relèveras-tu pas ? Si tu n'agis pas bien, le péché, tapi à ta porte, te désire. Mais toi, domine-le. »

- Caïn (comme avant lui Adam et Eve) bénéficie d'un discours direct du Seigneur

--

  - dans le début de la Genèse, les personnages parlent avec Dieu "à hauteur d'homme"

--

  - le récit ne mentionne pas de parole du Seigneur à Abel... 

--

  - Caïn est en position d'interlocuteur (privilégié?) devant le Seigneur, qui lui pose des questions 

--

Le lecteur peut aussi se poser la question : Caïn est-il en colère et dépité... 

--

- en raison de son offrande n'a pas été regardée favorablement par le Seigneur ?

--

- en raison de la comparaison avec Abel...?

--

- ou un mélange des deux ! 

--

Les deux premières questions sont ouvertes : "Pourquoi?"

---

Vient ensuite une question plus fermée (rhétorique) : 

--

> Si tu agis bien, ne le relèveras-tu pas ?

--

- litt. n’(y aura-t-il) pas élévation ?

--

  - d'où "relever le visage"

--

- le texte n'explicite pas le lien entre le "bien agir" et le "relèvement", mais Caïn n'est pas soumis à un destin inexorable

--

  - le texte biblique ne fonctionne pas comme une tragédie grecque ! 

---

> Si tu n'agis pas bien, le péché, tapi à ta porte, te désire. Mais toi, domine-le.

--

- il y a une symétrie dans "l'agir bien" (verbe יָטַב )

--

  - NON : si tu agis bien / si tu agis mal

--

  - mais : si tu agis bien / si tu n'agis pas bien

--

  - la référence reste le BIEN AGIR

--

- la liberté de Caïn est donc soulignée

--

  - positivement :  possibilité d'élévation

--

  - négativement : l'absence de "bien agir" semble ouvrir une porte

--

  - le péché (חַטָּאָה) est figuré comme une bête, plus ou moins en embuscade. 

--

  - "le péché qui te désire"  s'oppose au "relèvement"... cela suggère donc un abaissement

--

Une note de la NBS indique

--

```
 le verbe hébreu rabats, qui se dit généralement d'un animal au repos 
 (29.2 être au repos ; 49.9,14 se coucher, 25 étendu), 
 peut faire penser au démon babylonien Rabitsou qui, 
 tapi sur le seuil, se tenait prêt à bondir sur celui qui passait
```

---

- "Mais toi, domine-le" : le verbe "dominer" (מָשַׁל) a été utilisé

--

  - pour la domination des astres sur le jour et la nuit en Gn1 

--

  - pour la domination de l'homme sur la femme après la transgression

--

  > Ton désir se portera vers ton mari, et lui, il te dominera. (Gn 3,16)

--

- on retrouve dans ce verset les deux mots-clés : désirer et dominer

--

  - le désir de la femme se porte vers son mari, et la domination du mari semble aller plus ou moins de soi... 

--

  - le péché désire Caïn, lorsqu'il a "ouvert une porte" en n'agissant pas bien, et la domination de Caïn sur le péché est... possible

--

  - même si elle ne va pas de soi !

---

Cette PAROLE du SEIGNEUR est adressée à Caïn au moment où :

--

- son état intérieur est fait de colère et d'abattement

--

- sa liberté intérieure reste entière, car il n'a pas encore "agi"

--

- le récit tient ensemble deux choses : 

--

  - la force qui poussera Caïn sur une pente descendante, s'il "ouvre une porte" 

--

  - l'appel à dominer cette force, en "agissant bien". 

--

- cet "agir bien" n'est pas seulement à entendre sur un registre moral :

--

  - verbe יָטַב = être bien, bon, heureux

--

  - Gn 12,16 "Quant à Abram, on le **traita bien** à cause d’elle [Sarah]"

--

  - bonté, bienveillance, bonheur

---

### Le Seigneur s'est-il montré injuste ?

--

Le texte ne dit pas POURQUOI l'offrande d'Abel est regardée favorablement, mais pas celle de Caïn. 

--

Mais il ne dit pas non plus COMMENT Caïn sait que son offrande n'est pas agréée... 

--

- Le texte ne dit pas tout, et nous laisse avec notre incompréhension... 

--

- La position du lecteur est peut-être proche de celle de Caïn ? 

--

Certains commentaires anciens essaient d'expliquer que Caïn a offert "de ce qu'il y avait de moins bon" (Rachi), mais c'est aller au-delà de ce qui est écrit...

--

On a noté que Caïn ne répond pas aux questions du Seigneur : "Pourquoi ?"

--

- Il aurait pu s'expliquer, ou se plaindre, ou demander lui-même une explication 

--

  - "Pourquoi n'as-tu pas agréé mon offrande ?"

--

- Il n'est pas interdit de répondre à une question... par une autre question ! 

--

  - Mais Caïn ne saisit pas l'occasion.

---

> 8Caïn parla à son frère Abel et, lorsqu'ils furent aux champs, Caïn attaqua son frère Abel et le tua.

--

* "Caïn parla à son frère Abel"

--

  * litt. : Cain **dit** à son frère Abel... 

--

  * on attendrait ensuite les paroles prononcées par Caïn

--

  * certains manuscrits ajoutent "allons aux champs"

--

  * mais on peut aussi bien comprendre le récit nous présente une parole non-dite

--

  * Caïn ne répond pas au Seigneur

--

  * et il dit à son frère... RIEN

--

* "lorsqu'ils furent aux champs, Caïn attaqua son frère Abel et le tua."

--

  * vis-à-vis de Caïn, Abel est toujours nommé "son frère"

--

  * le récit souligne que le premier meurtre est un fratricide

--

    => tout meurtre n'est-il pas un fratricide ?

---

Retenons que Caïn a "répondu" aux questions du Seigneur, non en paroles, mais en acte. 

--

L'offrande à Dieu signifie normalement la reconnaissance envers lui. 

--

- Les fruits de la terre viennent de la bonté du créateur

--

- L'offrande (des prémisses) exprime la gratitude de l'être humain, qui reçoit la nature comme un don.

--

Le passage de la logique de l'offrande à celle du meurtre est saisissant. 

--

- la rivalité entre frères semble être la cause de ce basculement

--

- la pensée moderne va rapidement demander des comptes à Dieu... après tout, ce serait lui qui serait responsable de la situation !

--

  - prenons conscience que le texte ne nous oriente pas vers ce genre de question

--

  - Dieu n'explique pas... il interpelle Caïn !

--

  - il souligne la liberté de Caïn, dans son "agir bien" (ou non)

---

- on peut chercher (un instant) en quoi pourrait consister le fait d'agir-bien : 

--

  - parler au Seigneur, répondre à ses questions, voire le questionner...

--

  - parler à Abel... en vérité ! 

--

  - pour lui demander conseil? 

--

  - "Abel son frère" pourrait être une aide pour Caïn, même (surtout) dans une situation d'incompréhension ou de colère

---

### Les conséquences du fratricide

--

> 9Le SEIGNEUR dit à Caïn : « Où est ton frère Abel ? » 
> 
> – « Je ne sais, répondit-il. Suis-je le gardien de mon frère ? »

--

- la question du Seigneur est rhétorique

--

  - il offre à Caïn l'occasion de prendre la parole

--

- la réponse de Caïn relève du mensonge

--

  - "je ne sais"

--

- avec une contre-question (rhétorique) : "Suis-je le gardien de mon frère?"

--

  - Caïn n'a pas saisi la première occasion de dire la vérité, ou de questionner le Seigneur

--

  - après le meurtre, sa parole est faussée :  il sous-entend qu'il n'est PAS le gardien de son frère

---

- La question est tout de même intéressante, car le verbe "garder" est très utilisé dans la Bible

--

  - Gn 2,15 "Le Seigneur Dieu prit l’homme et le plaça dans le jardin d’Eden pour le cultiver et pour le **garder**."  => prendre soin

--

  - Gn 17,9 "Dieu dit à Abraham : Toi, tu **garderas** mon alliance"  => observer

--

  - Gn 30,31 "je recommencerai à faire paître ton petit bétail ; je le **garderai**."

--

- C'est la question fondamentale des rapports entre frères (entre humains?) que Caïn souligne

--

  - rivalité ?

--

  - prendre soin / garder ?

--

- Caïn pense qu'il n'est PAS le gardien de son frère, 

--

  - mais le lecteur du récit peut comprendre l'exact inverse ! 

--

  - Caïn aurait pu / dû prendre soin de son frère

--

  - ou accepter que son frère puisse prendre soin de lui ?

---

> 10« Qu'as-tu fait ? reprit-il. 
--

> 
> La voix du sang de ton frère crie du sol vers moi. 
--

> 
> 11Tu es maintenant maudit du sol qui a ouvert la bouche pour recueillir de ta main le sang de ton frère. 
--

> 
> 12Quand tu cultiveras le sol, il ne te donnera plus sa force. 
> 
--

> Tu seras errant et vagabond sur la terre. »

--

- Remarquer que le Seigneur continue de questionner Caïn

--

  - "Qu'as-tu fait ?"

--

  - même si le Seigneur sait ce que Caïn a fait, il le questionne

--

  - il questionne sa conscience.

--

La suite des paroles divines s'exprime sur le mode du constat.

--

- Le Seigneur énonce, avec autorité, les conséquences du fratricide

--

  - pour le sol
--

  - pour Caïn

---

- Le Seigneur ne dit pas :

--

  - sois maudit

--

- mais

--

  - tu es maudit du sol

--

- la conséquence de cela est que

--

  - le "sol" ne donnera plus sa force à Caïn... qui est cultivateur ! 

--

  - il deviendra donc errant sur la Terre

--

Le premier constat, dont dépend la suite, mentionne le sang

--

> La voix du **sang** de ton frère crie du sol vers moi.

--

* le sang versé, appelle, crie : "Justice !"

--

* la Torah va établir des règles pour que justice soit faite, lorsque le sang est versé. 

---

### SANG

--

Au sortir de l'Arche, Noé recevra de nouvelles instructions, lorsque le Seigneur établira une alliance avec lui. 

--

**Gn 9**<br/>

> 4 Seulement, vous ne mangerez pas de chair avec sa **vie**, c’est-à-dire avec son **sang**.<br/>
--

> 5 De plus, je **réclamerai** [דָּרַשׁ] votre **sang**, pour votre **vie** [נֶפֶשׁ] ; je le **réclamerai** à tout animal ; et je **réclamerai** à chaque être humain la **vie** de l’homme qui est son **frère**.<br/>
--

> 6 Celui qui répand le **sang** de l’être humain, par l’être humain son **sang** sera répandu. Car à l’image de Dieu l’homme a été fait.

--

- le sang, c'est la VIE, et elle appartient à Dieu
--

  * lorsque le sang est versé, par un animal ou un humain, Dieu va le "réclamer"
--

  * "réclamer"  [דָּרַשׁ] = litt. chercher
--

  * enquêter
--

  * poursuivre (poursuites judiciaires)
--

  * il faut comprendre qu'il n'y aura pas d'impunité... 
--

  * que le sang versé appelle une compensation
---

Un premier principe est donc :

--

* le sang appartient à Dieu... 

--

  * c'est lui qui se charge de le "réclamer"

--

Mais au v.6 : "Celui qui répand le sang de l’être humain, par l’être humain son sang sera répandu"

--

* changement de style (non pas JE, VOUS) mais "celui qui"...

--

  * retour sur le plan humain

--

  * loi de réciprocité

--

  * sorte de "loi" de la nature => loi divine ?

--

  * justice à hauteur d'humains

---

- Le principe fondamental est que c'est Dieu qui "poursuit" le sang versé

--

  - mais les être humains sont eux aussi responsables de rechercher la justice

--

- Rachi suggère que les être humains sont responsables de rendre la justice, laissant à Dieu de poursuivre le meurtrier qui a agi dans le secret

--

  ```
  A celui qui tue volontairement et sans qu'il y ait de témoins, 
  c'est moi qui lui en demanderai compte [note sur Gn 9,5]
  ```
--

  - responsabilité des humains => code civil

--

  - ce qui dépasse les humains => Dieu s'en charge ?

--

Ce thème sera repris dans les lois concernant le "rédempteur du sang" [ גֹּאֵ֣ל הַדָּ֑ם]

---

**Nb 35**

--

> 9 Le Seigneur dit à Moïse :
> [...]
> 11 vous choisirez des villes qui seront pour vous des **villes de refuge**, pour que le **meurtrier** qui a tué quelqu'un **par erreur** puisse s’y enfuir.<br/>
> 12 Ces villes seront pour vous refuge pour échapper au **rédempteur** ; ainsi le meurtrier ne mourra pas avant d’avoir comparu devant la communauté pour être jugé.<br/>
> 15 Ces six villes serviront de refuge aux Israélites [...] là pourra s’enfuir tout homme qui aura tué quelqu’un par erreur.

--

> 20 Si un homme pousse son prochain parce qu’il le déteste, s’il jette quelque chose sur lui avec préméditation, et que la mort s’ensuive,
> <br/>
> 21 [...] c’est un meurtrier : le **rédempteur du sang** mettra à mort le meurtrier quand il le rattrapera.
> 

--

> 26 Si le meurtrier sort des limites de la ville de refuge où il s’est enfui
> <br/>
> 27 et que le rédempteur du sang le trouve hors des limites de la ville de refuge, si le rédempteur du sang tue le meurtrier, il ne sera pas coupable de meurtre.

---

- le "rédempteur du sang" est chargé de "réclamer" le sang versé... 

--

  - en versant lui-même le sang de l'agresseur. 

--

  - selon le principe énoncé à Noé : "Celui qui répand le sang de l’être humain, par l’être humain son sang sera répandu"

--

  - le principe est celui de la rétribution

--

"si le rédempteur du sang tue le meurtrier, il ne sera pas coupable de meurtre"

--

- le système du rédempteur vise deux choses a priori contradictoires

--

  - verser le sang du meurtrier

--

  - sans devenir soi-même un meurtrier

--

  - sinon, le sang continuera d'être versé sans fin, au nom d'une "juste vengeance"...

--

- d'un côté, l'exigence de justice, dans une société

--

- de l'autre le risque d'un cycle infernal de violence qui ne s'arrête jamais

---

### Retour à l'histoire de Caïn

--

- même si "la voix du sang de ton frère crie du sol vers moi"

--

- le Seigneur ne réclame PAS que le sang de Caïn soit versé ! 

--

  - le récit est situé avant toutes les règles d'un futur code civil

--

  - par sa position originelle, ce récit a une fonction critique de ce qui va suivre. 

--

  - est-il vraiment nécessaire, au fond, que le sang du meurtrier soit versé ?

---

### Réaction de Caïn...

--

> 13Caïn dit au SEIGNEUR : « Ma faute est trop lourde à porter. 
> <br/>
> 14Si tu me chasses aujourd'hui de l'étendue de ce sol, je serai caché à ta face, je serai errant et vagabond sur la terre, et quiconque me trouvera me tuera. » 

--

- pour la première fois dans le récit, Caïn parle au Seigneur pour dire la vérité :

--

  - "Ma faute est trop lourde à porter"

--

- Caïn reprend les termes du "constat" énoncé par le Seigneur

--

  - "je serai errant et vagabond sur la terre"

--

- mais il ajoute l'idée que le Seigneur le chasse

--

  - ce qui était un "constat" dans les paroles du Seigneur

--

  - est interprété comme un châtiment, une décision divine.

---

La fin des paroles de Caïn est remarquable : 

--

> quiconque me trouvera me tuera

--

- le système du "rédempteur du sang" n'est pas encore en place

--

- mais le meurtre lui-même fait du meurtrier une cible.

--

On peut tout de même s'interroger : en dehors d'Adam et Eve... qui pourrait bien tuer Caïn ?

--

Certaines éditions de Rachi précisent : 

--

```
il s'agit des animaux domestiques et des bêtes sauvages
```

--

D'après ces traditions, Caïn se dit en effet :

--

```
Désormais, à cause de cette faute que j'ai commise,
les bêtes ne me craindront plus et elles me tueront.
```

---

### Réaction du Seigneur...

--

> 15Le SEIGNEUR lui dit : « Eh bien ! Si l'on tue Caïn, il sera vengé sept fois. » 
> <br/>
> Le SEIGNEUR mit un signe sur Caïn pour que personne en le rencontrant ne le frappe.

--

- ce signe sur Caïn :

--

  - évitera que le sang de Caïn soit versé

--

  - en le protégeant des animaux sauvages ?

--

- la priorité n'est pas de "poursuivre" le sang versé

--

  - c'est, au contraire, d'empêcher que le sang (de Caïn) soit versé

--

- on peut dire, ici, que Dieu "prend soin" du meurtrier

--

  - il le "garde", pour éviter que la violence se déchaîne... 

--

On peut donc lire le signe sur Caïn comme une "mesure de sauvegarde".

---

- la *punition* semble assurée par le sol

--

  - qui ne donne plus sa force à Caïn, 

--

  - car il a "ouvert la bouche" pour "recueillir" le sang d'Abel

--

- la vengeance est interdite par Dieu lui-même

--

  - au moyen d'un signe (dont on ne connaît rien d'autre que l'existence)

--

  - mais sous la menace d'une vengeance "sept fois plus". 

--

- on peut donc lire dans la fin du texte

--

  - la volonté divine de contenir la  violence

--

  - et le danger d'un déferlement de cette violence au septuple... 

---

> 16Caïn s'éloigna de la présence du SEIGNEUR et habita dans le pays de Nod à l'orient d'Eden.

--

- au final, Caïn ne semble pas "errant et vagabond"

--

- mais il s'éloigne de la présence du Seigneur

--

  - il pense qu'il est "chassé" ?

--

- il s'est éloigné de la présence du Seigneur

--

  - en ne répondant pas, la première fois, aux questions que le Seigneur lui pose

--

  - en tuant son frère

--

  - puis en s'installant "dans le pays de Nod"

--

En jouant sur le mot Nod (qui peut signifier "mouvement"), Rachi note

--

```
"Dans le pays de Nod" - partout où il allait, 
la terre tremblait sous ses pieds et les créatures disaient :
"Écartez-vous de lui, c'est lui qui a tué son frère !"
```

---

**Lamek, descendant de Caïn**

--

La suite de Gn 4 présente les descendants de Caïn, et sept générations plus tard, un certain Lamek affirme :

--

> 24Oui, Caïn sera vengé sept fois, mais Lamek soixante-dix-sept fois. 

--

- sept générations plus tard, la spirale de la vengeance s'intensifie, au moins en paroles... 

--

  - non plus sept fois,

--

  - mais soixante-dix-sept fois

--

Ceci nous rappelle les paroles de Jésus à Pierre : 

--

**Mt 18,21-22**

--

> Alors  Pierre vint lui demander : Seigneur, combien de fois pardonnerai-je à 
> mon frère, lorsqu'il péchera contre moi ? Jusqu'à sept fois ? 
--
<br/>
> Jésus lui dit : Je ne te dis pas jusqu'à sept fois, mais jusqu'à soixante-dix fois sept fois.

---
> Alors  Pierre vint lui demander : Seigneur, combien de fois pardonnerai-je à 
> mon frère, lorsqu'il péchera contre moi ? Jusqu'à sept fois ? 
<br/>
> Jésus lui dit : Je ne te dis pas jusqu'à sept fois, mais jusqu'à soixante-dix fois sept fois.


- Jésus surenchérit encore sur Lamek,

--

  - mais pour promouvoir le pardon, et non la vengeance !

--

- Ce faisant, Jésus est fidèle au "signe sur Caïn"

--

  - qui visait à interdire la vengeance

--

  - au risque d'un déferlement au septuple... voire davantage.

--

- Mais Jésus renverse la logique

--

  - non pour interdire la vengeance

--

  - mais commander de pardonner

---

On peut aussi se rappeler Mt 5,21-22a

--

> Vous avez entendu qu'il a été dit aux anciens : Tu ne commettras pas de **meurtre** ; celui qui commet un **meurtre** sera passible du jugement. 
--
<br>
> Mais moi, je vous dis : Quiconque se met en **colère** contre **son frère** sera passible du jugement.

--

- Jésus remonte, plus haut que le meurtre : à la colère

--

  - car elle peut conduire au meurtre

--

  - comme Caïn envers son frère Abel

--

- il est remarquable que Jésus ne parle pas ici du "prochain", mais du "frère".

--

  - car tout être humain est mon frère / ma sœur

--

  - il s'agit de lutter contre la racine du meurtre... telle qu'exposée dans le récit de la Genèse

---

### Un verset de psaume pour terminer

--

**Ps 50(51),16** (TOB)

--

> Mon Dieu, Dieu sauveur, libère-moi du sang ;
> <br/>
> que ma langue crie ta justice !

--

- le psaume est attribué à David

--

  - "Quand le prophète Natan alla chez lui, après que David fut allé chez Bethsabée" (v.1)

--

- le "sang" peut alors renvoyer au sang versé, 

--

  - sur ordre de David, qui a commandé la mort d'Urie, l'époux de Bethsabée.

--

- David prie, afin d'être libéré du sang qu'il a fait verser.

--

C'est ce qu'exprime la traduction liturgique : 

--

> Libère-moi du sang versé, Dieu, mon Dieu sauveur, et ma langue acclamera ta justice.
