# Violence des hommes ! <br/>Violence de Dieu ?

--

### Mercredi de théologie 2/5

--

# Une leçon de non-violence pour David

--

C'est le titre d'un ouvrage de S. Ramond qui analyse la manière dont David va recevoir d'une femme, une "leçon de non-violence" qui se vérifiera dans les rapports (conflictuels et compliqués) entre David et Saül. 

---

## Premier livre de Samuel (1Sa)

--

Ce livre relate le choix du prophète Samuel, et les débuts de la royauté en Israël.

--

Le peuple demande à Samuel : 

--

> Tu es devenu vieux, et tes fils ne marchent pas sur tes traces. Maintenant donc, établis, pour nous gouverner, un roi comme en ont toutes les nations. (1Sa 8,5)

--

C'est une mauvaise idée, car cela signifie que le peuple rejette son roi véritable, à savoir, le SEIGNEUR !

--

Mais, étrangement, le Seigneur accède à la demande du peuple, et il ordonne à Samuel :

--

- d'avertir le peuple, de le mettre en garde...

--

- puis de leur donner un roi : ce sera... Saül

--

Très vite, Saül s'avère un mauvais roi, et le Seigneur déclare à Samuel :

--

> Je l'ai rejeté pour qu'il ne règne plus sur Israël.

--

Samuel est envoyé oindre l'un des fils de Jessé :  ce sera le plus jeune, celui qui gardait le troupeau, David. 

---

### Problème :

--

il y a désormais deux "messies" en Israël

--

- Saül, qui a reçu l'onction en premier, mais que le Seigneur a rejeté

--

- David, qui a reçu l'onction "au milieu de ses frères"

--

  > L'Esprit du Seigneur s'empara de David à partir de ce jour-là. (1Sa 16,13)

--

La suite du premier livre de Samuel est construite autour de l'opposition entre le roi qui reste au pouvoir (Saül), et le roi que Dieu s'est choisi (David)... qui est encore tout jeune. 

--

- il faut préciser que Saül ignore que David a reçu cette onction, 

--

- et Samuel se garde bien de l'en informer... car il craint pour sa propre vie !

--

La suite du récit met en présence les deux "messies", car sous l'influence d'un mauvais esprit, Saül est tourmenté.

---

David est embauché au service de Saül, pour ses talents de musicien, afin de le soulager !

--

> Saül envoya dire à Jessé : "Que David se tienne donc à ma disposition, car il a trouvé grâce à mes yeux."

--

David va aussi sortir Saül d'un mauvais pas en affrontant Goliath, le champion philistin dont il sera victorieux grâce à l'arme du berger : la fronde. 

--

> Depuis ce jour-là, Saül regardait David avec méfiance. (1Sa 18,9)

--

En effet, le peuple commence à chanter les louanges de David, et à le comparer avec Saül : et la comparaison est au bénéfice de David !

---

### L'attentat manqué

--

Lors d'une séance de "thérapie musicale"...

--

> David jouait de son instrument comme chaque jour, et Saül avait sa lance à la main. 
--
<br/>
> Saül la lança en se disant : "Je vais clouer David au mur".
--
<br/> 
> Mais par deux fois, David échappa à Saül. (1Sa 18,10b-11)

--

La suite de récit est très étonnante

--

> Saül eut peur de David. 
--
<br/>
> En effet, le Seigneur était avec David et le Seigneur s'était écarté de Saül. (1Sa 18,12)

--

David va donc devoir fuir devant Saül

--

> David alla demeurer au désert dans des refuges : il demeura dans la montagne, au désert de Zif. Pendant tout ce temps, Saül ne cessa de rechercher David, mais Dieu ne le livra pas entre ses mains. (1Sa 23,14)

---

## 1 Sa 24-26

--

Ces trois chapitres sont assez longs, et présentent une structure remarquable, qu'on peut comparer à un drame en 3 actes

--

#### Acte I : David épargne Saül à Enn-Guédi (1 Sa 24)

--

- Saül est à la poursuite de David avec 3000 hommes
--

- Saül entre dans une grotte pour satisfaire un besoin naturel...
--

- il ignore que David et ses hommes sont cachés dans la grotte
--

- les hommes de David l'incitent à tuer Saül, au motif que le Seigneur l'a livré entre ses mains
--

- David coupe un pan du manteau de Saül, puis "il sentit son cœur battre"
--

- il réprimande ses hommes : pas question de "porter la main" sur le "messie du Seigneur"
--

- quand Saül est à bonne distance, David lui révèle qu'il aurait pu le tuer, mais qu'il ne l'a pas fait : le pan de manteau coupé en est la preuve
--

- Saül reconnaît que David est plus juste que lui
--

- Saül reconnaît : "Maintenant, je le sais : tu seras le roi et la royauté d'Israël restera entre tes mains."
--

- Saül demande à David d'épargner sa descendance, ce que David promet.

---

#### Acte II : David, Nabal et Abigaïl (1 Sa 25)

--

* la sagesse d'Abigaïl, femme de Nabal, va éviter à David de verser le sang

--

  * tel Caïn lorsqu'il est plein de colère

--

  * David est prêt à massacrer Nabal (et les siens)

--

  * mais contrairement à Caïn, il fait la rencontre d'Abigaïl, qui lui donne une "leçon de non-violence"

---

#### Acte III : David épargne Saül à Hakila (1 Sa 26)

--

* Saül est à la poursuite de David avec 3000 hommes
--

* David apprend où se trouve le camp de Saül, et demande qui veut descendre avec lui dans le camp
--

* *Abishaï*  est volontaire : il se propose de tuer Saül avec sa propre lance, car le Seigneur l'a livré entre les mains de David.
--

* "David dit à Avishaï : « Ne le tue pas ! Qui pourrait porter la main sur le messie du SEIGNEUR et demeurer impuni ? »"
--

* David prend la lance et la gourde qui sont au chevet de Saül et s'en va
--

* "Ils dormaient tous : une torpeur venue du SEIGNEUR était tombée sur eux."
--

* A bonne distance, David interpelle d'abord Abner, qui n'a pas bien gardé le roi : la lance et la cruche en sont la preuve
--

* Saül reconnaît la voix de David, qui lui reproche sa poursuite injuste
--

* Saül reconnaît son péché, et promet de ne plus faire de mal à David
--

* David fait restituer la lance du roi, et en appelle à la justice du Seigneur
--

* Saül bénit David, et annonce sa réussite... puis ils se séparent.

---

La proximité entre les chap. 24 et 26, où David épargne Saül par deux fois, indique qu'il faut lire le chap. 25 dans ce contexte particulier. 

--

Même si les personnages du chap. 25 sont différents (Nabal et Abigaïl, plutôt que Saül), la place de ce chapitre entre deux récits similaires n'est pas le fruit du hasard. 

--

* Dans les trois chapitres, de longs discours permettent aux personnages de discuter : 

--

  * les paroles ont autant de poids que les gestes

--

  * ceci contraste avec le récit où Caïn refuse de prendre la parole... avant de tuer son frère

--

* A première lecture, ce sont les nombreuses ressemblances entre les actes I et III qui sont marquantes.

--

  * il sera utile d'observer aussi les (lègères) différences entre les deux récits

--

  * pour interpréter l'acte II

---

A première lecture, on peut s'étonner :

--

* car David refuse la violence dans les actes I et III...

--

  * il va même s'opposer à ceux qui proposent de tuer Saül

--

* alors que dans l'acte II

--

  * il choisit la violence... 

--

  * dont il sera heureusement détourné par Abigaïl

---

## Lecture de 1 Sa 25 (TOB)

--

> 1Samuel mourut. Tout Israël se rassembla et célébra son deuil. On l'ensevelit 
> chez lui à Rama. 

--

Cette notice nécrologique est étonnamment brève :  surtout pour l'homme qui donne son nom à 2 livres bibliques. 

--

A première lecture, on ne voit pas le rapport avec lui suite... il faudra y revenir plus tard.

--

> David se mit en route et descendit vers le désert de Parân.
> <br/>
> 2Il y avait à Maôn un homme dont l'exploitation se trouvait à Karmel. <br/>Cet 
> homme était fort riche. Il avait trois mille moutons et mille chèvres. <br/>
> Il était à Karmel pour la tonte de son troupeau. 3L'homme s'appelait Naval, et sa femme Avigaïl. <br/>La femme était intelligente et jolie, mais l'homme était dur et méchant ; il était calébite.

--

* La scène est située dans le sud du pays

--

* les deux nouveaux personnages sont caractérisés de manière très contrastée

--

  * dans la suite du récit, chaque personnage "tiendra son rôle"

---

> 4Apprenant au désert que Naval tondait ses moutons, 5David envoya dix garçons. <br/>David dit aux garçons : « Montez à Karmel. Vous irez trouver Naval et vous le saluerez de ma part. <br/>6Vous direz : Bonne année ! Salut à toi, salut à ta maison, salut à tout ce qui t'appartient ! <br/>7J'apprends qu'on fait la tonte chez toi. Maintenant, quand tes bergers ont été avec nous, nous ne les avons pas molestés, et ils n'ont rien perdu pendant tout le temps de leur séjour à Karmel. <br/>8Interroge tes garçons et ils t'informeront. Que mes garçons trouvent chez toi un accueil favorable, car nous sommes venus un jour de fête ! <br/>Donne, je te prie, ce que tu peux donner à tes serviteurs et à ton fils David. »

--

* Nabal est très riche

--

* David fait demander une récompense pour les "bons services" de ses serviteurs

--

  * les notes des bibles indiquent qu'un tel usage existe, car les troupeaux des villages étaient exposés au pillage par des maraudeurs. 

--

* mais les mots de David laissent planer une ambiguïté : "ils n'ont rien perdu pendant tout le temps de leur séjour à Karmel"

--

  * car les hommes de David les ont bien protégés... d'un danger extérieur ?
--

  * ou parce qu'ils ne les ont pas molestés !

--

* Nabal est invité à "interroger ses garçons"

---

> 9Les garçons de David, étant arrivés, répétèrent toutes ces paroles à Naval au nom de David, et ils attendirent. 10Naval répondit aux serviteurs de David : <br/>« Qui est David et qui est le fils de Jessé ? Il y a aujourd'hui beaucoup d'esclaves qui s'évadent de chez leur maître. 11Et je prendrais de mon pain, de mon eau, de ma viande, que j'ai fait abattre pour mes tondeurs, pour les donner à des gens venus je ne sais d'où ! » <br/>12Les garçons de David firent demi-tour et s'en retournèrent. 

--

- Nabal refuse :

--

  - de donner de ses provisions

--

  - et aussi d'interroger ses garçons

--

- son opinion sur David est déjà faite : il sait que David est fils de Jessé

--

  - il s'exprime avec mépris

--

  - en comparant David avec un esclave en fuite

--

> A leur retour, ils vinrent rapporter tout cela à David. 

--

- comment David va-t-il réagir ?

---

  - aller à la rencontre de Nabal ?

--

  - s'expliquer en personne avec lui ?

--

> 13David dit à ses hommes : « Que chacun ceigne son épée ! » Chacun ceignit son épée. David, lui aussi, ceignit son épée. Environ quatre cents hommes montèrent à la suite de David, il en restait deux cents près des bagages.

--

- noter la répétition du mot "épée"

--

  - l'affaire risque de se régler dans la violence :  l'épée pourrait ne servir qu'à impressionner... 

--

La suite du récit ouvre une autre scène

---

> 14Un des garçons avertit Avigaïl, la femme de Naval : « Voici, dit-il, que 
> David a envoyé du désert des messagers porter ses compliments à notre 
> maître, et notre maître s'est jeté sur eux. 

--

- le serviteur livre une interprétation des faits

--

  - "porter ses compliments" 

--

  - David a fait dire : "Bonne année ! Salut à toi"

--

  - "notre maître s'est jeté sur eux"

--

  - au sens figuré ! Nabal ne s'est pas conformé à l'usage, et a humilié David par ses paroles

---

> 15Or, ces hommes ont été très bons pour nous. Nous n'avons pas été molestés et nous n'avons rien perdu tout le temps que nous avons circulé avec eux, quand nous étions à la campagne. 16Ils ont été notre rempart la nuit et le jour, tout le temps que nous avons été avec eux à faire paître les brebis. 

--

- nous apprenons maintenant que les serviteurs de David ont vraiment protégé les bergers de Nabal :  

--

  - ils ont été "**très** bons" 

--

- ni "molestés" et "rien perdu" 

--

  - ce sont les termes de David, repris par le serviteur

--

- "Ils ont été notre rempart la nuit et le jour..."

--

  - expression lyrique, qui fait comprendre que la demande de David était parfaitement légitime

--

  - mais Nabal n'a pas interrogé ses serviteurs avant de répondre à David... 

---

Le serviteur poursuit, s'adressant à Abigaïl :

--

> 17Et maintenant, reconnais et vois ce que tu dois faire, car la perte de 
> notre maître et de toute sa maison est décidée. Quant à lui, c'est un vaurien à qui on ne peut parler. »

--

- il est invraisemblable qu'un serviteur s'exprime ainsi devant sa maîtresse
--

  - mais Abigaïl reprendra le terme "vaurien" pour qualifier Nabal
--

- noter l'impossibilité de parler
--

  - qui peut nous évoquer le silence de Caïn

--

Que va faire Abigaïl ?

--

> 18Avigaïl se hâta de prendre deux cents pains, deux outres de vin, cinq brebis 
> tout apprêtées, cinq mesures de grains grillés, cent grappes de raisin sec et deux cents gâteaux de figues, et elle les chargea sur les ânes. 19Elle dit aux garçons : « Passez devant moi. Je vous suis. » Mais elle ne prévint pas Naval, son mari.

--

- Abigaïl agit rapidement

--
  - la liste des provisions est impressionnante

--
- le texte la décrit comme une femme ayant autorité

--
  - elle ne prévient pas son mari

---

> 20Tandis que, montée sur un âne, elle descendait à l'abri de la montagne, David et ses hommes descendaient dans sa direction. Elle les rencontra. 

--

Alors que le lecteur s'attend à la rencontre, qui sera déterminante pour la suite du récit... il découvre un "flaskback"  (analepse)

--

> 21David  s'était dit : « C'est donc en vain que j'ai protégé au désert tous les biens de cet individu sans que rien en disparaisse. Il m'a rendu le mal pour le bien. <br/>22Que Dieu fasse ceci et encore cela à David – ou plutôt à ses ennemis – si, d'ici demain matin, de tout ce qui lui appartient, je lui laisse rien de ce qui urine contre un mur ! » 

--

- le narrateur nous fait pénétrer les pensées de David

--

  - non pas, au moment où il part en expédition (punitive)

--

  - mais au moment de la rencontre avec Abigaïl

--

- l'état intérieur de David est la détermination

--

  - il s'est juré d'exterminer Nabal et tous ses mâles

--

  - cette affaire est devenue une querelle d'egos masculins

--

Mais David va rencontrer une femme.

---

> 23Apercevant David, Avigaïl se hâta de descendre de l'âne. Elle se jeta face contre terre devant David et se prosterna. 
<br/>
--
 24Puis elle tomba à ses pieds et dit : « A moi, à moi la faute, mon seigneur !
>  Puisse ta servante parler à tes oreilles ! Ecoute les paroles de ta servante. 
<br/>
--
25Que mon seigneur ne fasse pas attention à ce vaurien, à Naval, car il mérite bien son nom :  il s'appelle Infâme, et l'infamie s'attache à lui. 

--

- Abigaïl sort le grand jeu :

--

  - prosternation

--

  - "mon seigneur"  (אֲדֹנִי)

--

- elle détourne l'attention de David

--

  - non pas sur Nabal : "vaurien" ou "infâme" (ou "fou")

--

  - mais sur elle... "à moi la faute"

---

On peut s'étonner de ce qu'Abigaïl réclame la faute...

--

* est-ce la faute de Nabal ?

--

  * ou de David ?

--

* ceci nous révèle que l'intention première d'Abigaïl

--

  * n'est pas d'établir les responsabilités exactes de chacun dans le conflit

--

  * en recherchant la manifestation de la vérité

--

* en prenant sur elle la faute, Abigaïl risque de recevoir la fureur de David

--

  * mais puisqu'elle est une femme... elle a une chance de freiner David

--

  * d'autant que le récit précise, au v. 1, qu'elle est "très belle"

--

  * la suite du discours d'Abigaïl va confirmer que l'intention d'Abigaïl est de détourner David de sa violence

---

> Mais moi, ta servante, je n'avais pas vu les garçons de mon seigneur, tes envoyés. 
<br/>
--
26Cependant, mon seigneur, par la vie du SEIGNEUR et par ta propre vie, c'est le SEIGNEUR qui t'a empêché d'en venir au meurtre et de triompher par ta propre main. 
Que tes ennemis, que ceux qui veulent du mal à mon seigneur connaissent maintenant le sort de Naval ! 
<br/>
--
27Que cet hommage que ton esclave apporte à mon seigneur soit donné maintenant aux garçons qui marchent sur les pas de mon seigneur. 
<br/>
--
28Pardonne, je te prie, la faute de ta servante.

--

- la "faute" d'Abigaïl...

--

  - "n'avoir pas vu"...

--

  - est largement compensée

--

  - le présent préparé par Abigaïl dépasse ce que David pouvait espérer de Nabal

--

Remarquer qu'au fil de son discours, Abigaïl **interprète théologiquement** la situation (v.26)

--

* "c'est **le SEIGNEUR** qui t'a empêché d'en venir au **meurtre** et de triompher **par ta propre main**." (TOB)

--

* "c’est le Seigneur qui t’a empêché de verser le **sang** et d’assurer toi-même ton propre **salut**." (NBS)

--

C'est particulièrement audacieux de la part d'Abigaïl

---

* au moment où elle empêche David d'en venir au sang

--

* elle affirme que c'est le Seigneur qui agit

--

  * prétention ?

--

  * humilité ?

--

  * les deux ?

--

Mais le discours d'Abigaïl ne s'arrête pas là :  

--

- elle poursuit son propos théologique, 

--

  - au futur, 

--

  - sans plus mentionner Nabal

--

  - mais à propos de David.

---

> « En effet, le SEIGNEUR ne manquera point de faire à mon seigneur une maison stable, parce que mon seigneur a livré les guerres du SEIGNEUR et qu'on ne trouve pas de mal en toi, durant toute ta vie. 
<br/>
--
29Des hommes se sont levés afin de poursuivre mon seigneur et d'attenter à ses jours, mais la vie de mon seigneur restera ensachée dans le sachet des vivants auprès du SEIGNEUR, ton Dieu, tandis que celle de tes ennemis, le SEIGNEUR la lancera au loin, du creux de sa fronde. 
<br/>
--
30Lorsque le SEIGNEUR accomplira pour mon seigneur tout ce qu'il a dit de bien à ton sujet, il t'établira chef d'Israël. 

--

- la "fronde" rappelle la victoire de David contre Goliath

--

- la "maison stable" anticipe la promesse que le prophète Nathan adressera à David

--

- "des hommes se sont levés" : évoque les hommes de Saül

--

- le mot "chef d'Israël"

--

  - annonce la pleine royauté de David

--

  - qui "accomplira" tout ce que "LE SEIGNEUR" a dit

--

Ceci permet de relire l'attitude d'Abigaïl, lorsqu'elle rencontre David

---

* elle se prosterne, elle l'appelle "mon seigneur"...  

--

  * est-ce pour amadouer David ?

--

  * c'est aussi une attitude appropriée... envers le (futur) roi.

--

Abigaïl a une sagesse impressionnante, qui lui permet de discerner, dans les événements, la volonté divine !

--

Elle conclut son discours en s'adressant directement à David : 

--

> 31Tu ne dois donc pas chanceler en versant le sang à la légère, mon seigneur ne doit pas trébucher en voulant triompher par lui-même. Et quand le SEIGNEUR aura fait du bien à mon seigneur, tu te souviendras de ta servante. »

--

- Abiagïl se permet d'expliquer à David les enjeux profonds de son attitude envers Nabal

--

  - "tu ne risqueras pas de chanceler ou de trébucher dans ton cœur pour avoir, sans raison, répandu du **sang**, et pour avoir voulu assurer **toi-même** ton **salut.**" (NBS)

--

- ce qui vaut pour tout être humain vaut encore plus pour David, appelé à régner

--

  - ceci fait le lien entre les trois actes :  1Sa24-26

---

> 32David dit à Avigaïl : « Béni soit le SEIGNEUR, le Dieu d'Israël, qui t'a envoyée en ce jour à ma rencontre ! 33Béni soit ton bon sens, bénie sois-tu toi-même, pour m'avoir aujourd'hui retenu d'en venir au meurtre et de triompher par ma propre main ! 
<br/>
--
34Mais vraiment, par la vie du SEIGNEUR, le Dieu d'Israël, qui m'a empêché de te faire du mal, si tu n'étais pas venue aussi vite à ma rencontre, il ne serait resté à Naval, d'ici l'aurore, rien de ce qui urine contre un mur ! » 
<br/>
--
35David prit de sa main ce qu'elle lui avait apporté. A elle-même il dit : « Remonte en paix chez toi. Vois : j'ai écouté ta voix et je t'ai fait grâce. »

--

- David accepte pleinement le discours d'Abigaïl (et ses provisions)

--

  - il rappelle sa détermination violente, 

--

  - pour souligner le rôle d'Abigaïl : "si tu n'étais pas venue aussi vite"...

--

- dans le même mouvement, il donne lui aussi une interprétation théologique 

--

  - "par la vie du SEIGNEUR, le Dieu d'Israël, qui m'a empêché de te faire du mal"

--

La violence a failli déferler... 

--

Le pire a été évité grâce à l'intervention conjointe de DEUX acteurs, qui sont tous deux bénis

---

- "Béni soit le SEIGNEUR" ... qui t'a envoyée

--

- "Béni soit ton bon sens, bénie sois-tu toi-même"

--

Dans le récit que nous avons lu, RIEN n'indiquait qu'Abigaïl était "envoyée" par le Seigneur.

--

- David interprète ce qui vient de se passer

--

  - il redit les événements... 

--

  - en nommant l'action du Seigneur 

--

  - qu'il reconnaît au cœur des actions humaines

--

l'action du Seigneur est relue :

--

- dans la sagesse d'Abigaïl

--

- dans la 'retenue' de David, qui a été "empêché de lui faire du mal"

--

  - c'est à dire au cœur de la liberté de David

--

  - alors qu'il était échauffé (comme Caïn ?)

---

> 36Avigaïl revint chez Naval. Voici qu'il faisait dans sa maison un festin, un 
> vrai festin de **roi**. Naval avait le cœur en joie. Il était complètement ivre. Elle ne l'informa de rien jusqu'à l'aurore. 
<br/>
--
37Le lendemain matin, quand Naval eut cuvé son vin, sa femme lui raconta ce qui s'était passé. Alors le cœur de Naval mourut dans sa poitrine, et il fut comme pétrifié. 
<br/>
--
38Et au bout d'une dizaine de jours, le SEIGNEUR frappa Naval, et il mourut.

--

Remarquons le double récit de la mort de Nabal

--

- au plan humain

--

  - "le cœur de Naval mourut dans sa poitrine"

--

- interprété théologiquement 

--

  - "le SEIGNEUR frappa Naval"

--

La mort de Nabal valide la leçon d'Abigaïl :  

--

- ce n'est pas à David de triompher par lui-même. 

--

  - David mettra cette leçon en application dans l'acte III.

---

> 39David apprit que Naval était mort et il dit : « Béni soit le SEIGNEUR qui a défendu ma cause, dans cet affront que m'avait fait Naval, et qui a retenu son serviteur de faire le mal. Quant à la malice de Naval, le SEIGNEUR l'a fait retomber sur sa tête. »

--

- l'action divine, relue par David, ne se limite pas à punir le méchant

--

  - elle se lit aussi dans la "retenue" : pour éviter à David de faire le mal.

--

Enfin, David va épouser Abigaïl, veuve de Nabal... selon ce qu'Abigaïl avait laissé entrevoir :

--

"Et quand le SEIGNEUR aura fait du bien à mon seigneur, tu te souviendras de ta servante."

---

## Progression entre les trois actes

--

La question de la royauté n'est pas absente de l'acte II. 

--

Dans l'acte I et dans l'acte III, des personnages donnent une interprétation théologique des faits

--

**1SA 24,5** : dans la caverne où Saül est allé satisfaire un besoin naturel, ignorant la présence de David et ses hommes

--

> 5Les hommes de David lui dirent : « C'est le jour dont le SEIGNEUR t'a dit : Voici que je vais livrer ton ennemi entre tes mains, et tu le traiteras comme il te plaira. »

--

- le récit biblique ne mentionne PAS cette parole du Seigneur plus haut dans le texte... 

--

- "tu le traiteras comme il te plaira"

--

  - souligne la liberté de David... 

--

  - pour tuer Saül ?

--

  - ou pas ?

---

A la fin du chapitre, David valide *en partie* cette lecture théologique :

--

**1Sa 24,11**

--

> le SEIGNEUR t'avait livré entre mes mains, aujourd'hui dans la caverne ; on parlait de te tuer, 
<br/>
--
mais j'ai eu pitié de toi et j'ai dit : “Je ne porterai pas la main sur mon seigneur, car il est le messie du SEIGNEUR.”

--

- David confirme que le Seigneur avait livré Saül... 

--

  - mais il refuse l'interprétation sanguinaire de ce "fait"

--

  - il choisit d'épargner Saül

--

- ceci se reproduit en 1Sa 26,11

---

### Le rôle de Samuel, <br/>la symbolique du manteau, <br/>et la nouveauté de l'acte III

--

**1Sa 15,26-28** : après avoir été oint par Samuel, le roi Saül a péché, et il est rejeté

--

> 26 Samuel dit à Saül : Je ne reviendrai pas avec toi. Puisque tu as rejeté la parole du Seigneur, le Seigneur te rejette : tu ne seras plus roi sur Israël.
--

> <br/>27 Comme Samuel se tournait pour s’en aller, Saül le saisit par le pan de son manteau, qui se déchira.
--

> <br/>28 Samuel lui dit : Le Seigneur déchire aujourd’hui la royauté d’Israël pour te l’ôter, et il la donne à un autre, qui est meilleur que toi.

--


- c'est le manteau de Samuel qui est déchiré... par Saül

--

  - mais Samuel en fait un symbole de la royauté sur Israël qui est déchirée et que Saül va perdre... 

---

**Acte I : 1Sa 24,5b-6**

--

> David se leva et coupa furtivement le pan du manteau de Saül. 
--
<br/>6Mais après cela, David sentit son cœur battre, parce qu'il avait coupé le pan du manteau de Saül.

--

- le pan de manteau coupé 

--

  - sera la preuve de l'innocence de David à la fin de l'acte I

--

  - car David a renoncé à verser le sang

--

  - mais... 

--

- c'est une action symbolique, car c'est le manteau royal qui est découpé

--

  - David porte atteinte à un symbole de la royauté de Saül

--

  - veut-il "triompher par sa propre main" ?


---

> David sentit son cœur battre

--

- réaction naturelle ? C'est pourtant Saül qui est plus en danger que David... 

--

- en relisant le récit, on peut comprendre que David réalise ce qu'il est en train de faire

--

  - présence de l'Esprit Saint

--

Au **début de l'acte II**, le texte relate la mort de Samuel.

--

- Saül a compris que David serait roi

--

  - mais il craint pour sa descendance

--

- Samuel ne pourra pas aider David à accéder au trône

--

  - la tentation de "triompher par sa propre main" se fait plus vive pour David.

--

L'acte II révèle que c'est précisément ce que le Seigneur lui enseigne d'éviter !

---

**Acte III : 1Sa 26,12**

--

> 12David prit la lance et la gourde d'eau qui étaient au chevet de Saül, et ils s'en allèrent. 

--
<br/>Personne n'en vit rien, personne ne le sut, personne ne s'éveilla. Ils dormaient tous : une torpeur venue du SEIGNEUR était tombée sur eux.

--

- au niveau simplement humain

--

  - David prend la lance : symbole royal  

--

  - et la gourde : symbole humain

--

- au niveau divin

--

  - le récit souligne que le Seigneur assure le succès de l'opération

--

  - car personne ne se réveille !

--

La portée symbolique de l'acte de David est beaucoup plus forte dans l'acte III

---

* David s'est mis en position de vulnérabilité : il va dans le camp de Saül

--

  * dans l'acte I : Saül était vulnérable dans la grotte, au milieu des hommes de David

--

* David va "désarmer" le roi : il prend la lance

--

  * dans l'acte I : il utilisait une arme pour couper le pan du manteau

--

* en fin d'acte III, David restitue la lance

--

  * rien n'est dit sur la gourde

--

* David ne s'empare de rien "par lui-même"

--

  * il rend au roi son arme : symbole de violence et de mort

--

  * il conserve la gourde : symbole de vie

--

Dans les deux actes parallèles, il y a une progression.

---

Dans l'acte III, le texte souligne que David bénéficie de l'assistance divine, pour mener son opération de non-violence :

--

- dans les faits : 

--

  - ne pas verser le sang

--

- et au niveau symbolique

--

  - ne pas triompher par sa propre main

--

Dans l'acte III, David donne à Saül la leçon de non-violence qu'il a apprise dans l'acte II. 

---

## Pour finir

--

Comment la volonté de Dieu peut-elle se déployer sans faire violence à la liberté humaine ?

--

Dans les récits bibliques, la liberté humaine peut servir la volonté divine.

--

- Abigaïl agit avec toutes ses facultés humaines :

--

  - liberté

--

  - sagesse

--

  - détermination

--

- par là même, Dieu déploie son dessein. 

--

  - et David dira que c'est le Seigneur qui l'a "envoyée"

---

Le texte biblique utilise assez souvent, d'une manière qui semble limpide, des expressions comme 2Sa 11,1 :

--

> Le Seigneur envoya Nathan à David.

--

- cela ne signifie pas que Nathan soit une marionnette dans les mains de Dieu, ou que son agir soit "surnaturel"

--

  - il a toutes ses capacités humaines

--

  - y compris sa capacité d'initiative

--

- mais David a pu reconnaître, à la relecture des événements, que l'action de Nathan accomplissait le dessein de Dieu.

--

  - et cette interprétation est aujourd'hui inscrite dans le livre

---

### A la lumière de 1Sa 24-26

--

On peut essayer d'aborder une question difficile : 

--

**Comment le Seigneur s'y prend-il pour empêcher les guerres ?**

--

- va-t-il user de violence contre les violents ?

--

  - et, pourquoi pas, des interventions surnaturelles ?

--

- va-t-il "laisser faire" le mal ?

--

  - "le mal tuera les méchants"(Ps 33,22)

--

- va-t-il leur envoyer des Abigaïls ?

--

  - désarmées, mais déterminées et intelligentes 
  
--

  - interventions humaines, qui effectuent la volonté de Dieu ?

---

Prière eucharistique pour la réconciliation n°2 :

--

```
Au sein de notre humanité encore désunie et déchirée,
nous savons et nous proclamons
que tu ne cesses d'agir
et que tu es à l'origine de tout effort vers la paix.
```

--
```
Ton Esprit travaille au cœur des hommes:
et les ennemis enfin se parlent,
les adversaires se tendent la main,
des peuples qui s'opposaient
acceptent de faire ensemble une partie du chemin.
```

--
```
Oui, c'est à toi, Seigneur, que nous le devons,
si le désir de s'entendre l'emporte sur la guerre,
si la soif de vengeance fait place au pardon,
et si l'amour triomphe de la haine.
```

---

Ps 32,13-15


> Du haut des cieux, le Seigneur regarde : il voit la race des hommes.

--
 
> Du lieu qu'il habite, il observe tous les habitants de la terre,

--
 
> lui qui forme le cœur de chacun, qui pénètre toutes leurs actions.
